name: Build & Deploy

# Single source of truth for CI and the live demo. There must be no other
# workflow that deploys to the `github-pages` environment — two workflows
# racing for the same environment is what broke the deploy before.
#
# - `build`  runs on every push and PR (the CI gate: type-check + Vite build).
#            On non-PR events it also enables Pages and uploads the artifact.
# - `deploy` publishes to GitHub Pages on pushes to main and manual runs only.
#
# Pages source must be "GitHub Actions" (Settings → Pages). The build job calls
# configure-pages with `enablement: true`, so it self-heals if Pages is off.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check and build
        run: npm run build
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          # Enable Pages automatically if it isn't already, so a disabled
          # Pages site no longer hard-fails the deploy.
          enablement: true
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Deploy only for branch pushes and manual runs (never PRs).
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    # Serialize Pages deployments so concurrent runs don't clobber each other.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
